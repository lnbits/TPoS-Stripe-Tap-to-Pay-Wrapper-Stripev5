name: Build & Release APK

on:
  push:
    tags:
      - "*"
  release:
    types:
      - published
      - prereleased
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not set"
            exit 1
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/tpos-release.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build release APK
        run: |
          for secret_name in ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "$secret_name is not set"
              exit 1
            fi
          done

          ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/app/tpos-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Generate asset links metadata
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          CERT_SHA256="$("$APKSIGNER" verify --print-certs "$APK_PATH" | sed -n 's/.*SHA-256 digest: //p' | head -n 1)"

          if [ -z "$CERT_SHA256" ]; then
            echo "Failed to extract APK signing certificate SHA-256 fingerprint"
            exit 1
          fi

          cat > assetlinks.json <<EOF
          [
            {
              "relation": ["delegate_permission/common.handle_all_urls"],
              "target": {
                "namespace": "android_app",
                "package_name": "com.example.lnbitstaptopay",
                "sha256_cert_fingerprints": ["$CERT_SHA256"]
              }
            }
          ]
          EOF

          cat > assetlinks.yml <<EOF
          package_name: com.example.lnbitstaptopay
          sha256_cert_fingerprints:
            - $CERT_SHA256
          EOF

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            assetlinks.json
            assetlinks.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
